services:
  db:
    image: postgres:16
    container_name: nest_shop_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nest_shop_backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DB_HOST: db
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:${DB_PORT}/${DB_NAME}
      FRONTEND_URL: ${FRONTEND_URL}
    ports:
      - "3000:3000"

volumes:
  db_data:
